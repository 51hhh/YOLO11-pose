# Pipeline 配置: ZED X + AGX Orin (GPU-only, 960x960 模型)
# 不使用 DLA，不使用 VPI 校正（ZED 内部已校正）

camera:
  backend: "zed"              # "hik" 或 "zed"
  resolution: "HD1200"        # HD1200=1920x1200@60fps
  fps: 60
  depth_mode: "NEURAL_LIGHT"  # NONE / NEURAL_LIGHT / NEURAL / NEURAL_PLUS
  depth_stabilization: 0      # 0=禁用(快速移动物体), 1-100=平滑强度
  max_working_res_div: 2      # 内部深度计算分辨率除数 (2=960x600)
  manual_exposure: true
  exposure_pct: 60            # 5ms = 50Hz 半周期，减少灯光闪烁
  gain: 20
  image_enhancement: false    # 关闭 ZED 图像增强，降低延迟

# ZED 内部校正，rect_width/height 匹配 ZED 输出
rectify:
  output_width: 1920
  output_height: 1200
  backend: "CUDA"             # 实际不使用 VPI remap（ZED 路径跳过）

calibration:
  file: "config/zed_intrinsics.yaml"  # 从 ZED SDK 自动获取，此处仅作 fallback

detector:
  engine_path: "models/best_960_fp16.engine"
  input_size: 960
  use_dla: false              # GPU-only，不使用 DLA
  dla_core: 0
  confidence_threshold: 0.5
  nms_threshold: 0.4
  max_detections: 10
  input_format: "bgr"         # ZED BGRA→BGR 保留颜色信息给检测模型

stereo:
  strategy: "zed_sdk_depth"   # ZED SDK NEURAL_LIGHT 深度 (替代 roi_only 双目匹配)
  # 备选: "roi_only" (自研ROI多点匹配), "full_frame", "half_resolution"
  max_disparity: 128
  window_size: 5
  quality: 6

fusion:
  min_depth: 0.3
  max_depth: 20.0
  object_diameter: 0.21       # 排球直径 21cm
  bbox_scale: 1.2
  mono_max_z: 4.0             # bbox@4m=32px, σ=377mm, 以上单目不可靠
  stereo_min_z: 1.0           # disp@1m=87px, σ=4.6mm, 双目完全可靠
  R_mono: 0.025               # Kalman单目噪声 (σ_z=z²×0.024, z_ref=4m+3×安全)
  R_stereo: 0.001             # Kalman双目噪声 (σ_z=z²×0.0046, z_ref=4m+3×安全)
  ivw_R_mono: 0.025           # IVW单目方差权重
  ivw_R_stereo: 0.003         # IVW双目方差权重 (含排球弱纹理3×惩罚)
  # 抗抖动
  noise_exponent: 2.0         # 噪声距离缩放 z² (配合已校准R_base)
  innovation_gate: 9.0        # 马氏距离²门限 (χ²(3,0.97)≈9)
  process_accel: 2.0          # Kalman过程噪声加速度 (m/s²)

performance:
  log_interval: 100
  pwm_frequency: 60           # ZED 60fps

prediction:
  gravity: 9.81
  air_density: 1.225
  ball_mass: 0.270
  ball_radius: 0.105
  drag_coeff: 0.47
  ground_y: 0.0
  max_predict_time: 3.0

# ===== 显示配置 =====
display:
  enable: false               # true=显示窗口(需接显示器), false=headless
                              # 命令行 --visualize 可覆盖此项

# ===== ROS2 发布配置 =====
ros2:
  enable: true                # 编译时需 -DUSE_ROS2=ON，否则此段无效
  world_frame_id: "vision_world"
  base_frame_id: "base_link"
  odom_topic: "/odom"
  odom_timeout_sec: 0.5
  topics:
    ball_realtime: "/ball/realtime"
    ball_landing: "/ball/landing"
    predicted_path: "/ball/predicted_path"
    actual_path: "/ball/actual_path"
    ball_realtime_base: "/ball/realtime_base"
    ball_landing_base: "/ball/landing_base"
  vision_to_world:
    swap_xy: false
    invert_x: false
    invert_y: false
    rotation_deg: 0.0
    translation_x: 0.0
    translation_y: 0.0
  diagnostic:
    enable: true              # 诊断发布 (深度图+检测框, 用于 rosbag 录制)
    depth_full_divisor: 6     # 全图降频因子 (60fps/6=10Hz)

# 录制设置
recording:
  enabled: true
  output_path: "raw_observation_data.csv"
  raw_mode: true   # true=记录原始观测(无Kalman滤波), false=记录滤波后轨迹
