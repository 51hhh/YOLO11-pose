# ============================================================
# Dual YOLO ROI test config
# Purpose: run left/right YOLO concurrently, then use epipolar
# center disparity as the stereo observation. Runtime baseline
# still comes from calibration.file, not fusion.baseline_mm.
# ============================================================

camera:
  left_index: 0
  right_index: 1
  serial_left: "00D39342665"
  serial_right: "00219471413"
  exposure_us: 9867.0
  gain_db: 11.9906
  use_trigger: true
  trigger_source: "Line0"
  trigger_activation: "RisingEdge"
  image_node_num: 3               # SDK OneByOne FIFO depth, absorbs USB arrival jitter
  embedded_info_clear_rows: 2     # FrameSpecInfo watermark rows cleared before debayer/YOLO
  trigger_chip: "gpiochip2"
  trigger_line: 7
  width: 1440
  height: 1080

calibration:
  file: "calibration/stereo_calib.yaml"

rectify:
  backend: "CUDA"
  output_width: 1280
  output_height: 720

tnr:
  enabled: false
  preset: "outdoor_medium"
  strength: 0.6
  version: "default"

detector:
  engine_path: "/home/nvidia/NX_volleyball/model/yolo26_gpu_fp16.engine"
  input_size: 640
  input_format: "bgr"
  use_dla: false
  dla_core: 0
  confidence_threshold: 0.15
  nms_threshold: 0.4
  max_detections: 10
  dual_yolo:
    enabled: true
    right_engine_path: ""      # empty means reuse detector.engine_path
    right_input_format: "bgr"
    right_use_dla: false
    right_dla_core: 1
    use_for_depth: true
    depth_modes:
      bbox_pair: true          # cheap left/right YOLO bbox-center disparity candidate
      bbox_edges: true         # bbox left/right edge disparity candidates
      circle_center: true      # actual ROI circle-fit triangulation candidate (needs center_refine)
      circle_edges: true       # circle left/right edge disparity candidates
      roi_edge_centroid: true  # gradient-weighted ROI edge centroid disparity candidate
      roi_radial_center: true  # radial-gradient center disparity candidate
      roi_edge_pair_center: true # paired left/right ROI edge center disparity candidate
      roi_corner_points: false # heavier sparse feature A/B mode; enable offline or after profiling budget is available
      roi_texture_points: false # heavier sparse feature A/B mode; enable offline or after profiling budget is available
      roi_binary_points: false  # heavier sparse feature A/B mode; enable offline or after profiling budget is available
      roi_orb_points: false    # true OpenCV CUDA ORB path when GPU image is available; slower A/B mode, not default 100fps
      roi_brisk_points: false  # no true CUDA BRISK backend on current NX; legacy GPU-lite/CPU debug only
      roi_akaze_points: false  # no true CUDA AKAZE backend on current NX; legacy GPU-lite/CPU debug only
      roi_sift_points: false   # no true CUDA SIFT backend on current NX; realtime path uses true OpenCV CPU SIFT
      roi_iou_region_color_patch: false # GPU color region IoU + patch candidate; requires BGR pipeline
      roi_patch_iou_color_edge: false # GPU color edge IoU + patch candidate; requires BGR pipeline
      roi_cuda_template_match: false # P2 OpenCV CUDA TemplateMatching small ROI epipolar candidate
      roi_cuda_stereo_bm: false # P2 OpenCV CUDA StereoBM small ROI dense disparity candidate
      roi_cuda_stereo_sgm: false # P2 OpenCV CUDA StereoSGM small ROI dense disparity candidate
      roi_center_patch: true   # P1 100fps training candidate; record z_roi_center_patch
      roi_subpixel: true       # P1 CUDA multi-point candidate; record z_roi_multi_point
      epipolar_fallback: true  # single-side miss -> bounded epipolar search candidate
      fallback_template: false # CPU fallback; keep off in 100fps realtime config
      fallback_feature_points: false # CPU fallback; keep off in 100fps realtime config
    fallback_to_roi_match: false       # legacy full ROI texture match, keep off for dual-YOLO test
    gpu_candidate_refine: true         # direct dual-YOLO ROI candidates run in one CUDA batch
    fallback_epipolar_search: true     # left/right single-side miss -> bounded epipolar search
    center_refine: true                # circle fit inside bbox/search ROI; GPU for direct pairs, CPU for fallback
    roi_denoise: true                  # local 3x3 denoise only inside ROI
    log_matches: true
    depth_solver: "roi_subpixel_match" # circle_center | roi_subpixel_match
    subpixel_enabled: true             # enables z_roi_multi_point P1 candidate for model training
    subpixel_patch_radius: 5
    subpixel_search_radius_px: 8
    subpixel_max_points: 12
    subpixel_min_points: 4
    subpixel_min_confidence: 0.25
    subpixel_max_disp_delta_px: 2.0
    subpixel_max_disp_delta_ratio: 0.03
    subpixel_max_depth_delta_m: 0.5
    subpixel_max_stddev_px: 1.0
    subpixel_time_budget_ms: 1.5
    epipolar_y_tolerance: 12.0       # bbox/circle semantic pair gate, not sparse feature y gate
    feature_y_tolerance_px: 2.0      # sparse keypoint y residual gate after rectification
    feature_y_slope: 0.0             # optional fixed epipolar tilt compensation dy = slope*(x-cx)+offset
    feature_y_offset_px: 0.0
    feature_reverse_check_px: 1.0    # left-right mutual check error
    feature_overlap_scale: 0.55      # keypoint must lie in projected L/R ball overlap ellipses
    feature_mad_scale: 2.5           # MAD outlier gate scale
    feature_ransac_gate_px: 0.75     # 1D disparity RANSAC minimum gate
    feature_sphere_radius_scale: 1.8 # triangulated point must stay near physical ball volume
    feature_sphere_margin_m: 0.02
    feature_normalize_large_roi: true      # downsample large ball ROIs before CPU feature matching
    feature_normalized_diameter_px: 96     # target ball diameter after normalization
    feature_normalize_min_diameter_px: 128 # keep small/far balls at native resolution
    feature_normalize_margin_scale: 0.62   # crop half-size as bbox size scale
    feature_precompute_roi_maps: true      # precompute gray label/edge maps inside normalized ROI
    max_size_ratio: 2.0
    min_shifted_iou: 0.05                  # shifted left/right bbox must still overlap after x-disparity compensation
    bbox_disparity_consistency_ratio: 0.30 # compare bbox-size depth prior with left/right center disparity
    bbox_disparity_consistency_min_px: 45.0
    bbox_disparity_penalty_scale: 0.75     # ranking penalty for physically inconsistent YOLO pairs
    fallback_search_margin_px: 48
    fallback_max_width_px: 220
    circle_max_roi_pixels: 18000

stereo:
  strategy: "roi_only"
  max_disparity: 2048          # 1m baseline: near range can exceed 1024 px
  window_size: 5
  quality: 6

fusion:
  min_depth: 0.8
  max_depth: 20.0
  baseline_mm: 1000.0          # reference only; calibration file is authoritative
  object_diameter: 0.200
  stereo_min_z: 0.8            # accept dual-YOLO stereo from the near test range
  mono_max_z: 1.2              # above this range, prefer stereo observations
  min_confidence: 0.1
  R_mono: 0.003
  R_stereo: 0.020
  ivw_R_mono: 0.004
  ivw_R_stereo: 0.025

performance:
  pwm_frequency: 100.0
  target_fps: 100
  log_interval: 100
  enable_profiling: true
  drop_stale_roi_frames: true  # 若后一帧 YOLO 已完成，跳过旧帧 IoU/特征/深度后处理以控制实时延迟
  async_roi_stage2: true        # 检测帧 ROI/IoU/特征候选异步执行；tracker detect_interval>1 时自动禁用，避免倒序更新深度
  async_roi_buffers: 3          # running + pending + free，避免持有 FrameSlot 被 ring buffer 覆盖
  async_roi_deadline_ms: 10.0   # 100Hz 下给 ROI 后处理的软预算
  p2_feature_job_scaffold_enabled: false      # 预留拆分 P2 FeatureJob；默认 false 保持完整 Stage2 inline 行为
  p2_realtime_lane_decision_enabled: true      # realtime lane 触发决策观测，不改变当前 inline 执行
  p2_diagnostic_lane_decision_enabled: false   # diagnostic lane 低频决策观测，独立 worker 待实测后启用
  p2_selective_trigger: false         # true 时只在 fallback/质量条件触发 P2
  p2_trigger_on_fallback: true
  p2_trigger_on_direct_pair: false
  p2_trigger_on_host_gray: false
  p2_trigger_on_bgr: false
  p2_diagnostic_stride: 10
  p2_diagnostic_max_in_flight: 1
  p2_realtime_deadline_ms: 10.0
  p2_diagnostic_deadline_ms: 50.0

tracker:
  enabled: false
  type: "nanotrack"
  engine_path: ""
  search_engine_path: ""
  head_engine_path: ""
  detect_interval: 3
  lost_threshold: 5
  min_confidence: 0.3

prediction:
  gravity: 9.81
  air_density: 1.225
  ball_mass: 0.270
  ball_radius: 0.105
  drag_coeff: 0.47
  ground_y: 0.0
  max_predict_time: 3.0

display:
  enable: false

ros2:
  enable: true
  world_frame_id: "vision_world"
  base_frame_id: "base_link"
  odom_topic: "/odom"
  odom_timeout_sec: 0.5
  topics:
    ball_realtime: "/ball/realtime"
    ball_landing: "/ball/landing"
    predicted_path: "/ball/predicted_path"
    actual_path: "/ball/actual_path"
    ball_realtime_base: "/ball/realtime_base"
    ball_landing_base: "/ball/landing_base"
  vision_to_world:
    swap_xy: false
    invert_x: false
    invert_y: false
    rotation_deg: 0.0
    translation_x: 0.0
    translation_y: 0.0
  diagnostic:
    enable: true
    depth_full_divisor: 6

recording:
  enabled: true
  output_path: "dual_yolo_observation_data.csv"
  # legacy: old CSV columns only; depth_candidates: add depth candidates;
  # extended: add sync watermark + bbox/circle geometry for model training.
  detail_level: "extended"
  raw_mode: true
  frame_summary_enabled: true       # writes dual_yolo_observation_data.frames.csv for frame-level miss/pair metrics
  max_queue_frames: 1000           # CSV 写入落后时丢记录，不阻塞 100fps 实时线程

baseline_recording:
  enabled: false
  output_dir: "baseline_clips"
  duration_sec: 3.0
  frame_limit: 0
  clip_count: 1
  clip_gap_sec: 0.0
  clip_gap_frames: 0
  require_left_detection: true
  require_right_detection: true
  require_pair_gate: false
  min_confidence: 0.0
  pair_y_tolerance_px: 30.0
  pair_max_size_ratio: 2.5
  pair_min_disparity_px: 0.0
  image_format: "png"
  image_mode: "gray"                  # gray|bgr; both 仅用于调试兼容，会额外写 left_bgr/right_bgr
  png_compression: 1
  write_after_capture: true           # 先快速缓存到内存，clip 结束后再写盘
  max_queue_frames: 0                 # 0=不限; write_after_capture=true 时建议不限或至少 >= frame_limit*clip_count
  stop_after_clip: true
