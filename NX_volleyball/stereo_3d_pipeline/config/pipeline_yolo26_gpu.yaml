# ============================================================
# Pipeline config for yolo26 GPU INT8 testing
# Uses yolo26_gpu_int8_entropy2 from matrix test results
# ROI mode stereo matching for minimum latency
# ============================================================

camera:
  left_index: 0
  right_index: 1
  serial_left: ""
  serial_right: ""
  exposure_us: 9867.0
  gain_db: 11.9906
  use_trigger: true
  trigger_source: "Line0"
  trigger_activation: "RisingEdge"
  trigger_chip: "gpiochip2"
  trigger_line: 7
  width: 1440
  height: 1080

calibration:
  file: "calibration/stereo_calib.yaml"

rectify:
  backend: "CUDA"
  output_width: 1280
  output_height: 720

tnr:
  enabled: true
  preset: "outdoor_medium"
  strength: 0.6
  version: "default"

# yolo26 GPU INT8 - 3.20ms, 86% accuracy
# Standard [1,5,8400] output format
detector:
  engine_path: "/home/nvidia/NX_volleyball/model/matrix_results/yolo26_gpu_int8_entropy2.engine"
  input_size: 640
  input_format: "gray"
  use_dla: false
  confidence_threshold: 0.15
  nms_threshold: 0.4
  max_detections: 10

stereo:
  strategy: "roi_only"
  max_disparity: 256
  window_size: 5
  quality: 6

fusion:
  min_depth: 0.3
  max_depth: 15.0
  baseline_mm: 326.8
  object_diameter: 0.200
  R_mono: 0.003
  R_stereo: 0.020
  ivw_R_mono: 0.004
  ivw_R_stereo: 0.025

performance:
  pwm_frequency: 100.0
  target_fps: 100
  log_interval: 100
  enable_profiling: true

# ========== Prediction ==========
prediction:
  gravity: 9.81
  air_density: 1.225
  ball_mass: 0.270
  ball_radius: 0.105
  drag_coeff: 0.47
  ground_y: 0.0
  max_predict_time: 3.0

# ========== Display ==========
display:
  enable: false

# ========== ROS2 发布配置 ==========
ros2:
  enable: true
  world_frame_id: "vision_world"
  base_frame_id: "base_link"
  odom_topic: "/odom"
  odom_timeout_sec: 0.5
  topics:
    ball_realtime: "/ball/realtime"
    ball_landing: "/ball/landing"
    predicted_path: "/ball/predicted_path"
    actual_path: "/ball/actual_path"
    ball_realtime_base: "/ball/realtime_base"
    ball_landing_base: "/ball/landing_base"
  vision_to_world:
    swap_xy: false
    invert_x: false
    invert_y: false
    rotation_deg: 0.0
    translation_x: 0.0
    translation_y: 0.0
  diagnostic:
    enable: true
    depth_full_divisor: 6

# ========== Recording ==========
recording:
  enabled: true
  output_path: "raw_observation_data.csv"
  raw_mode: true
