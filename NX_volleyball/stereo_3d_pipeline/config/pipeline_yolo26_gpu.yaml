# ============================================================
# Pipeline config for yolo26 GPU INT8 testing
# Uses yolo26_gpu_int8_entropy2 from matrix test results
# ROI mode stereo matching for minimum latency
# ============================================================

camera:
  left_index: 0
  right_index: 1
  serial_left: ""
  serial_right: ""
  exposure_us: 9867.0
  gain_db: 11.9906
  use_trigger: true
  trigger_source: "Line0"
  trigger_activation: "RisingEdge"
  trigger_chip: "gpiochip2"
  trigger_line: 7
  width: 1440
  height: 1080

calibration:
  file: "calibration/stereo_calib.yaml"

rectify:
  backend: "CUDA"
  output_width: 1280
  output_height: 720

tnr:
  enabled: true
  preset: "outdoor_medium"
  strength: 0.6
  version: "default"

# yolo26 GPU INT8 - 3.20ms, 86% accuracy
# Standard [1,5,8400] output format
detector:
  engine_path: "/home/nvidia/NX_volleyball/model/matrix_results/yolo26_gpu_int8_entropy2.engine"
  input_size: 640
  input_format: "gray"
  use_dla: false
  confidence_threshold: 0.3
  nms_threshold: 0.4
  max_detections: 10

stereo:
  strategy: "roi_only"
  max_disparity: 256
  window_size: 5
  quality: 6

fusion:
  min_depth: 0.3
  max_depth: 15.0
  baseline_mm: 326.8

performance:
  pwm_frequency: 100.0
  target_fps: 100
  log_interval: 100
  enable_profiling: true
