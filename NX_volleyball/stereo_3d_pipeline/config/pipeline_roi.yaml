# ============================================================
# stereo_3d_pipeline ROI config (GPU INT8 640x640 + VPI TNR)
# ROI multi-point stereo matching, replacing full-frame disparity
# Target: 100 FPS volleyball tracking
# Tested: 100 FPS on Jetson Orin NX Super (2026-05-24)
# ============================================================

# ========== Camera (DO NOT MODIFY) ==========
camera:
  left_index: 0
  right_index: 1
  serial_left: ""
  serial_right: ""
  exposure_us: 9867.0          # User-calibrated exposure
  gain_db: 11.9906             # User-calibrated gain
  use_trigger: true
  trigger_source: "Line0"
  trigger_activation: "RisingEdge"
  trigger_chip: "gpiochip2"
  trigger_line: 7
  width: 1440
  height: 1080

# ========== Calibration ==========
calibration:
  file: "calibration/stereo_calib.yaml"

# ========== Rectification (VPI Remap CUDA) ==========
rectify:
  backend: "CUDA"
  output_width: 1280
  output_height: 720

# ========== VPI Temporal Noise Reduction ==========
# TNR V3 CUDA backend: ~0.04ms per frame pair (negligible)
tnr:
  enabled: true
  preset: "outdoor_medium"     # indoor_low|indoor_high|outdoor_low|outdoor_medium|outdoor_high
  strength: 0.6                # 0.0~1.0
  version: "default"           # default|v1|v2|v3

# ========== Detection (TensorRT GPU INT8 640x640) ==========
# Engine: yolo26 GPU INT8 - 2.89ms avg, 345 qps
detector:
  engine_path: "/home/nvidia/NX_volleyball/model/yolo26_gpu_int8.engine"
  input_size: 640
  use_dla: false
  dla_core: 0
  allow_gpu_fallback: false
  confidence_threshold: 0.5
  nms_threshold: 0.4
  max_detections: 10

# ========== Stereo Matching (ROI multi-point) ==========
# ROI mode: 0.01ms vs full-frame 70ms
stereo:
  strategy: "roi_only"         # roi_only|half_resolution|full_frame
  max_disparity: 256
  window_size: 5
  quality: 6

# ========== 3D Fusion ==========
fusion:
  min_depth: 0.3
  max_depth: 15.0
  baseline_mm: 326.8

# ========== Performance ==========
performance:
  pwm_frequency: 100.0         # PWM trigger frequency (Hz)
  target_fps: 100
  log_interval: 100
  enable_profiling: true

# ========== SOT Tracker (YOLO inter-frame infill) ==========
# Disabled by default. Enable to run YOLO every N frames, tracker fills gaps.
tracker:
  enabled: false
  type: "nanotrack"            # nanotrack | mixformer
  engine_path: ""              # backbone (single) or template backbone (dual)
  search_engine_path: ""       # nanotrack dual-backbone: search backbone engine
  head_engine_path: ""         # nanotrack only (BAN head engine)
  detect_interval: 3           # YOLO every N frames, tracker fills the rest
  lost_threshold: 5            # consecutive tracker failures before IDLE
  min_confidence: 0.3          # minimum tracker score to accept
