# ============================================================
# stereo_3d_pipeline ROI config (GPU FP16 640x640 + VPI TNR)
# ROI multi-point stereo matching, replacing full-frame disparity
# Target: 100 FPS volleyball tracking
# Tested: 100 FPS on Jetson Orin NX Super (2026-05-27)
# ============================================================

# ========== Camera (DO NOT MODIFY) ==========
camera:
  left_index: 0
  right_index: 1
  serial_left: ""
  serial_right: ""
  exposure_us: 9867.0          # User-calibrated exposure
  gain_db: 11.9906             # User-calibrated gain
  use_trigger: true
  trigger_source: "Line0"
  trigger_activation: "RisingEdge"
  trigger_chip: "gpiochip2"
  trigger_line: 7
  width: 1440
  height: 1080

# ========== Calibration ==========
calibration:
  file: "calibration/stereo_calib.yaml"

# ========== Rectification (VPI Remap CUDA) ==========
rectify:
  backend: "CUDA"
  output_width: 1280
  output_height: 720

# ========== VPI Temporal Noise Reduction ==========
# TNR V3 CUDA backend: ~0.04ms per frame pair (negligible)
tnr:
  enabled: true
  preset: "outdoor_medium"     # indoor_low|indoor_high|outdoor_low|outdoor_medium|outdoor_high
  strength: 0.6                # 0.0~1.0
  version: "default"           # default|v1|v2|v3

# ========== Detection (TensorRT GPU FP16 640x640) ==========
# Engine: yolo26 GPU FP16 - 4.44ms avg, 224 qps
detector:
  engine_path: "/home/nvidia/NX_volleyball/model/yolo26_gpu_fp16.engine"
  input_size: 640
  use_dla: false
  dla_core: 0
  confidence_threshold: 0.5
  nms_threshold: 0.4
  max_detections: 10

# ========== Stereo Matching (ROI multi-point) ==========
# ROI mode: 0.01ms vs full-frame 70ms
stereo:
  strategy: "roi_only"         # roi_only|half_resolution|full_frame
  max_disparity: 256
  window_size: 5
  quality: 6

# ========== Learned ROI Feature Matching (experimental, TensorRT only) ==========
# Offline CPU validation:
#   .venv-stereo-neural/bin/python tools/neural_feature_probe.py \
#     --xfeat-repo ~/.local/share/stereo_3d_pipeline/neural_repos/accelerated_features \
#     --roi-size 224 --top-k 128
#
# Realtime NX policy:
#   - keep disabled until TensorRT engines are exported and benchmarked on NX
#   - use fixed ROI shape, batch left/right ROI together where the exporter supports it
#   - still apply epipolar/disparity/final-cluster gates before using depth
neural_feature_matching:
  enabled: false
  backend: "xfeat"             # xfeat | aliked | superpoint_lightglue
  extractor_engine_path: ""    # XFeat/ALIKED/SuperPoint extractor TensorRT engine
  matcher_engine_path: ""      # optional LightGlue/LighterGlue TensorRT engine; used only when use_lightglue=true
  fused_engine_path: ""        # optional full extractor+matcher TensorRT engine
  roi_size: 224
  top_k: 128
  descriptor_dim: 64
  min_matches: 8
  max_y_error_px: 2.0
  max_disp_delta_px: 32.0
  final_disp_gate_px: 2.0
  min_score: 0.0
  use_lightglue: false

# ========== 3D Fusion ==========
fusion:
  min_depth: 0.3
  max_depth: 15.0
  baseline_mm: 326.8

# ========== Performance ==========
performance:
  pwm_frequency: 100.0         # PWM trigger frequency (Hz)
  target_fps: 100
  log_interval: 100
  enable_profiling: true

# ========== SOT Tracker (YOLO inter-frame infill) ==========
# Disabled by default. Enable to run YOLO every N frames, tracker fills gaps.
tracker:
  enabled: false
  type: "nanotrack"            # nanotrack | mixformer
  engine_path: ""              # backbone (single) or template backbone (dual)
  search_engine_path: ""       # nanotrack dual-backbone: search backbone engine
  head_engine_path: ""         # nanotrack only (BAN head engine)
  detect_interval: 3           # YOLO every N frames, tracker fills the rest
  lost_threshold: 5            # consecutive tracker failures before IDLE
  min_confidence: 0.3          # minimum tracker score to accept

# ========== Prediction ==========
prediction:
  gravity: 9.81
  air_density: 1.225
  ball_mass: 0.270
  ball_radius: 0.105
  drag_coeff: 0.47
  ground_y: 0.0
  max_predict_time: 3.0

# ========== Display ==========
display:
  enable: false               # true=显示窗口(需接显示器), false=headless
                              # 命令行 --visualize 可覆盖此项

# ========== ROS2 发布配置 ==========
ros2:
  enable: true                # 编译时需 -DUSE_ROS2=ON，否则此段无效
  world_frame_id: "vision_world"
  base_frame_id: "base_link"
  odom_topic: "/odom"
  odom_timeout_sec: 0.5
  topics:
    ball_realtime: "/ball/realtime"
    ball_landing: "/ball/landing"
    predicted_path: "/ball/predicted_path"
    actual_path: "/ball/actual_path"
    ball_realtime_base: "/ball/realtime_base"
    ball_landing_base: "/ball/landing_base"
  vision_to_world:
    swap_xy: false
    invert_x: false
    invert_y: false
    rotation_deg: 0.0
    translation_x: 0.0
    translation_y: 0.0
  diagnostic:
    enable: true              # 诊断发布 (深度图+检测框, 用于 rosbag 录制)
    depth_full_divisor: 6     # 全图降频因子 (60fps/6=10Hz)

# ========== Recording ==========
recording:
  enabled: true
  output_path: "raw_observation_data.csv"
  raw_mode: true   # true=记录原始观测(无Kalman滤波), false=记录滤波后轨迹
