# ============================================================
# Pipeline config for yolo26 Dual DLA (DLA0 + DLA1 alternating)
# Even frames → DLA0, Odd frames → DLA1
# Each DLA FP16: ~23ms latency, dual throughput ~86 FPS
# GPU freed for rectify/stereo/fusion, DLA handles detection
# ============================================================

camera:
  left_index: 0
  right_index: 1
  serial_left: ""
  serial_right: ""
  exposure_us: 9867.0
  gain_db: 11.9906
  use_trigger: true
  trigger_source: "Line0"
  trigger_activation: "RisingEdge"
  trigger_chip: "gpiochip2"
  trigger_line: 7
  width: 1440
  height: 1080

calibration:
  file: "calibration/stereo_calib.yaml"

rectify:
  backend: "CUDA"
  output_width: 1280
  output_height: 720

tnr:
  enabled: true
  preset: "outdoor_medium"
  strength: 0.6
  version: "default"

# Dual DLA FP16 - alternating DLA0/DLA1
# DLA FP16 single: ~23ms, 98-99% accuracy
# Dual: latency per frame still ~23ms, throughput doubled
detector:
  engine_path: "/home/nvidia/NX_volleyball/model/matrix_results/yolo26_dla0_fp16.engine"
  engine_path_dla1: "/home/nvidia/NX_volleyball/model/matrix_results/yolo26_dla1_fp16.engine"
  input_size: 640
  use_dla: true
  dla_core: 0
  dual_dla: true
  allow_gpu_fallback: true
  confidence_threshold: 0.3
  nms_threshold: 0.4
  max_detections: 10

stereo:
  strategy: "roi_only"
  max_disparity: 256
  window_size: 5
  quality: 6

fusion:
  min_depth: 0.3
  max_depth: 15.0
  baseline_mm: 326.8

performance:
  pwm_frequency: 100.0
  target_fps: 100
  log_interval: 100
  enable_profiling: true
