# ============================================================
# Pipeline config for yolo26 Mixed Precision (attn FP16 + INT8)
# Attention layers (model.10, model.22) in FP16, rest INT8
# 26/205 layers FP16, 179/205 layers INT8, all on GPU
# Latency: 3.08ms (trtexec), accuracy same as GPU INT8
# ============================================================

camera:
  left_index: 0
  right_index: 1
  serial_left: ""
  serial_right: ""
  exposure_us: 9867.0
  gain_db: 11.9906
  use_trigger: true
  trigger_source: "Line0"
  trigger_activation: "RisingEdge"
  trigger_chip: "gpiochip2"
  trigger_line: 7
  width: 1440
  height: 1080

calibration:
  file: "calibration/stereo_calib.yaml"

rectify:
  backend: "CUDA"             # 实测本机 CUDA Remap 更快
  output_width: 1280
  output_height: 720

tnr:
  enabled: false              # ROI 模式下禁用 TNR: 省 ~8ms/帧 (6次VPI操作串行)
  preset: "outdoor_medium"    # 100Hz 硬触发 + 适当曝光无需 TNR
  strength: 0.6
  version: "default"

# yolo26 Mixed Precision - backbone INT8 + head/attn FP16
# 2.93ms GPU compute, [1,5,8400] output format
# model.10-23 all FP16 for detection accuracy, backbone INT8 for speed
detector:
  engine_path: "/home/nvidia/NX_volleyball/model/yolo26_head_fp16.engine"
  input_size: 640
  input_format: "bgr"
  use_dla: false
  confidence_threshold: 0.3
  nms_threshold: 0.4
  max_detections: 10

stereo:
  strategy: "roi_only"
  max_disparity: 256
  window_size: 5
  quality: 6

fusion:
  min_depth: 0.3
  max_depth: 15.0
  baseline_mm: 326.8

performance:
  pwm_frequency: 100.0
  target_fps: 100
  log_interval: 100
  enable_profiling: true
