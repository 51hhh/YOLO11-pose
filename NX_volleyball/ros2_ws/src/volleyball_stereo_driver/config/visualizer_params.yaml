# ============================================================
# 可视化节点配置 (volleyball_visualizer_node)
# ============================================================

volleyball_visualizer:
  ros__parameters:
    # ========== 显示参数 ==========
    show_stereo_view: true       # 显示双目并排视图
    show_trajectory: true        # 显示轨迹
    window_width: 1280           # 主窗口宽度
    window_height: 720           # 主窗口高度
    display_fps: 30.0            # 显示帧率
    max_trajectory_length: 100   # 轨迹历史最大长度
